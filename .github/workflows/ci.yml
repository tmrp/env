name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build And Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for `changeset status --since`

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Remind PR authors to include a changeset. Non-blocking on push to main.
      - name: Changeset status
        if: github.event_name == 'pull_request' && startsWith(github.head_ref,
          'release-')
        run: pnpm changeset status --since=origin/${{ github.base_ref }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test

      - name: Build Package
        run: pnpm build

      - name: Validate Package Contents
        run: pnpm pack --dry-run

      - name: Runtime Smoke Tests
        run: pnpm test:runtime
