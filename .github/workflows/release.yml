name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded release runs on the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # npm provenance / OIDC trusted publishing
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      # OIDC trusted publishing requires npm >= 11.5.1.
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test

      - name: Build Package
        run: pnpm build

      - name: Validate Package Contents
        run: pnpm pack --dry-run

      - name: Runtime Smoke Tests
        run: pnpm test:runtime

      # On push to main, this either opens/updates a "Version Packages" PR
      # (when changesets are pending) or publishes to npm (once that PR is
      # merged and the changesets are consumed).
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm run version:packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          # Fallback for classic token auth — only needed if OIDC trusted
          # publishing is NOT configured for @tmrp/env on npmjs.com, or the
          # runner's npm is < 11.5.1. Add NPM_TOKEN as a repo secret to use it.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
